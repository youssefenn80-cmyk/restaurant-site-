<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>أيقونة موقع Responsive</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .wide-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8vw; /* الحجم يتغير حسب عرض الشاشة */
      padding: 3vw 6vw; /* padding responsive */
      border-radius: 2vw;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      box-shadow: 0 1vw 2vw rgba(0,0,0,0.3);
      transition: transform 0.4s, box-shadow 0.4s, background 0.4s;
      max-width: 90vw; /* لا يتجاوز عرض الشاشة */
      text-align: center;
    }

    .wide-icon:hover {
      transform: scale(1.15) rotate(3deg);
      background: linear-gradient(135deg, #f6d365, #fda085);
      box-shadow: 0 1.5vw 3vw rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .label {
      text-align: center;
      font-size: 5vw; /* نص responsive */
      margin-top: 2vw;
      color: #fff;
      font-weight: bold;
    }

    /* تحسين للهاتف */
    @media (max-width: 600px) {
      .wide-icon {
        font-size: 12vw;
        padding: 5vw 8vw;
        border-radius: 4vw;
      }
      .label {
        font-size: 6vw;
      }
    }
  </style>
</head>
<body>
  <div>
    <i class="fas fa-globe wide-icon"></i>
    <div class="label">زور موقعنا الآن!</div>
  </div>
</body>
</html>
